name: AIFashionAnalyzer CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout (IMPORTANT: disables submodules to prevent your error)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # =========================
      # BACKEND
      # =========================

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests (if exists)
        working-directory: ./backend
        run: npm test --if-present

      - name: Build backend Docker image
        run: docker build -t aifashion-backend:latest ./backend

      # =========================
      # FRONTEND
      # =========================

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests (if exists)
        working-directory: ./frontend
        run: npm test --if-present

      - name: Build frontend Docker image
        run: docker build -t aifashion-frontend:latest ./frontend

      # =========================
      # OPTIONAL: Verify Docker images
      # =========================

      - name: List Docker images
        run: docker images

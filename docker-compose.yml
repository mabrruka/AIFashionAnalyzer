version: "3.8"

services:
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fashion_analyzer
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./Backend
    ports:
      - "3003:3001"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: fashion_analyzer
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PORT: ${PORT}

  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data: